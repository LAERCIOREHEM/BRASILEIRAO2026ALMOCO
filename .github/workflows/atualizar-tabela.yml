name: Atualizar tabela do Brasileirão

on:
  # Roda automaticamente: a cada hora, no minuto :17
  # (evita o pico de :00 que tem muito atraso no GitHub Actions)
  schedule:
    - cron: '17 * * * *'

  # Permite rodar manualmente pelo botão "Run workflow" no GitHub
  workflow_dispatch:

# Permissões: precisa escrever no próprio repositório (commitar tabela.json)
permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Buscar tabela e gerar tabela.json
        run: python atualizar.py

      - name: Commitar tabela.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tabela.json
          if git diff --staged --quiet; then
            echo "Sem mudanças na tabela — nada a commitar (raro: timestamp não mudou)."
          else
            git commit -m "Atualizar tabela.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"
            git push
            echo "✓ Commit realizado com sucesso"
          fi

