name: Atualizar tabela do Brasileirão

on:
  # Roda automaticamente: 2 vezes por hora, nos minutos :07 e :37
  # (evita o pico de :00, :15, :30, :45 que tem muito atraso no GitHub Actions)
  # Se um ciclo falhar/atrasar, o próximo cobre.
  schedule:
    - cron: '7,37 * * * *'

  # Permite rodar manualmente pelo botão "Run workflow" no GitHub
  workflow_dispatch:

  # Roda também quando o script atualizar.py mudar (segurança extra)
  push:
    paths:
      - 'atualizar.py'
      - '.github/workflows/atualizar-tabela.yml'

# Permissões: precisa escrever no próprio repositório (commitar tabela.json)
permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Buscar tabela e gerar tabela.json
        run: python atualizar.py

      - name: Commitar tabela.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tabela.json
          if git diff --staged --quiet; then
            echo "Sem mudanças na tabela — nada a commitar (raro: timestamp não mudou)."
          else
            git commit -m "Atualizar tabela.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"
            git push
            echo "✓ Commit realizado com sucesso"
          fi
